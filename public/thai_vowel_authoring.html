<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thai Vowel & Tone — Authoring Tool (#356, #833)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400&display=swap" rel="stylesheet">
<style>
  :root { --bg:#1a1a1e; --panel:#242429; --accent:#4f8ef7; --ok:#2a9d34; --text:#eee; --muted:#999; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display:flex; height:100vh; overflow:hidden; }

  #sidebar { width:200px; overflow-y:auto; background:var(--panel); border-right:1px solid #333; padding:8px; flex-shrink:0; }
  #sidebar h3 { font-size:11px; color:var(--muted); margin:10px 4px 4px; text-transform:uppercase; letter-spacing:0.06em; }
  .letter-btn { display:flex; align-items:center; justify-content:space-between; width:100%; padding:6px 8px; margin:2px 0;
    background:#2c2c33; border:1px solid #3a3a42; border-radius:6px; color:var(--text); cursor:pointer; font-size:22px; font-family:'Sarabun',sans-serif; }
  .letter-btn .name { font-size:11px; color:var(--muted); font-family:system-ui; }
  .letter-btn.active { border-color:var(--accent); background:#31394a; }
  .badge { font-size:10px; padding:2px 6px; border-radius:10px; font-family:system-ui; }
  .badge.done { background:#555; }
  .badge.pending { background:#663; color:#ffd; }

  #main { flex:1; display:flex; flex-direction:column; padding:16px; overflow-y:auto; gap:10px; }
  #topbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .letter-display { font-family:'Sarabun',sans-serif; font-size:48px; }
  .char-name { font-size:13px; color:var(--muted); }
  #progress { font-size:12px; color:var(--muted); margin-left:auto; }

  #canvasWrap { position:relative; width:460px; height:600px; background:#fff; border-radius:8px; overflow:hidden; touch-action:none; cursor:crosshair; }
  canvas { position:absolute; top:0; left:0; }

  .legend { display:flex; gap:14px; font-size:12px; color:var(--muted); }
  .legend span { display:inline-flex; align-items:center; gap:4px; }
  .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }

  #strokeInfo { font-size:13px; color:var(--muted); }
  #controls { display:flex; gap:8px; flex-wrap:wrap; max-width:460px; }
  button { background:#31394a; color:var(--text); border:1px solid #444; border-radius:6px; padding:8px 12px; cursor:pointer; font-size:13px; }
  button:hover { background:#3a4358; }
  button.primary { background:var(--accent); border-color:var(--accent); font-weight:600; }
  button.danger  { background:#c0392b; border-color:#c0392b; }

  #footer { padding-top:10px; border-top:1px solid #333; display:flex; gap:8px; flex-wrap:wrap; }

  #instructions { font-size:13px; color:var(--muted); line-height:1.5; max-width:460px;
    background:#2c2c33; border-radius:6px; padding:8px 12px; }
</style>
</head>
<body>

<div id="sidebar">
  <h3>Vogais independentes</h3>
  <div id="listStandalone"></div>
  <h3>Vogais acima</h3>
  <div id="listAbove"></div>
  <h3>Vogais abaixo</h3>
  <div id="listBelow"></div>
  <h3>Tons</h3>
  <div id="listTones"></div>
  <h3>Ditongos</h3>
  <div id="listDiphthong"></div>
  <h3>Especiais</h3>
  <div id="listSpecial"></div>
</div>

<div id="main">
  <div id="topbar">
    <div class="letter-display" id="letterDisplay">-</div>
    <div>
      <div id="charName" class="char-name">-</div>
      <div id="charType" class="char-name" style="color:#aaa"></div>
    </div>
    <div id="progress"></div>
  </div>

  <div id="instructions"></div>

  <div id="canvasWrap">
    <canvas id="bgCanvas" width="460" height="600"></canvas>
    <canvas id="drawCanvas" width="460" height="600"></canvas>
  </div>

  <div class="legend">
    <span><span class="dot" style="background:#2a9d34"></span> início</span>
    <span><span class="dot" style="background:#111"></span> fim</span>
    <span><span class="dot" style="background:#e63946"></span> traço 1</span>
    <span><span class="dot" style="background:#1d3557"></span> traço 2</span>
  </div>

  <div id="strokeInfo"></div>

  <div id="controls">
    <button id="btnUndo">↩ Desfazer</button>
    <button id="btnClear" class="danger">✕ Limpar</button>
    <button id="btnToggleBase">Mostrar/ocultar ก base</button>
    <button id="btnToggleGlyph">Mostrar/ocultar vogal</button>
  </div>

  <div id="footer">
    <button id="btnPrev">← Anterior</button>
    <button id="btnSkip">Manter &amp; próxima</button>
    <button id="btnNext" class="primary">Confirmar &amp; próxima →</button>
    <button id="btnDownload" class="primary">⬇ Baixar thaiVowelTones.js</button>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Vowels and tone marks with metadata
// ---------------------------------------------------------------------------
const CHARS = [
  // standalone (appear independently or before/after consonant as full glyph)
  { ch: "เ",  name: "Sara E",        group: "standalone" },
  { ch: "แ",  name: "Sara AE",       group: "standalone" },
  { ch: "โ",  name: "Sara O",        group: "standalone" },
  { ch: "ใ",  name: "Sara AI (ใ)",   group: "standalone" },
  { ch: "ไ",  name: "Sara AI (ไ)",   group: "standalone" },
  { ch: "า",  name: "Sara AA",       group: "standalone" },
  { ch: "ำ",  name: "Sara AM",       group: "standalone" },
  // above diacritics — rendered over ก base
  { ch: "ั",  name: "Mai Han Akat",  group: "above" },
  { ch: "ิ",  name: "Sara I",        group: "above" },
  { ch: "ี",  name: "Sara II",       group: "above" },
  { ch: "ึ",  name: "Sara UE",       group: "above" },
  { ch: "ื",  name: "Sara UEE",      group: "above" },
  { ch: "็",  name: "Mai Tai Khu",   group: "above" },
  // below diacritics — rendered under ก base
  { ch: "ุ",  name: "Sara U",        group: "below" },
  { ch: "ู",  name: "Sara UU",       group: "below" },
  // tone marks — above diacritics
  { ch: "่",  name: "Mai Ek (่)",    group: "tones" },
  { ch: "้",  name: "Mai Tho (้)",   group: "tones" },
  { ch: "๊",  name: "Mai Tri (๊)",   group: "tones" },
  { ch: "๋",  name: "Mai Jattawa (๋)", group: "tones" },
  // standalone vowel (short a)
  { ch: "ะ",  name: "Sara A (curta)", group: "standalone" },
  { ch: "อ",  name: "O (placeholder)", group: "standalone" },
  // diphthongs — rendered as full compound glyphs
  { ch: "เา",  name: "Sara AO",        group: "diphthong" },
  { ch: "เาะ", name: "Sara O (curta)", group: "diphthong" },
  { ch: "เอ",  name: "Sara OE (longa)",group: "diphthong" },
  { ch: "เอะ", name: "Sara OE (curta)",group: "diphthong" },
  { ch: "เีย",  name: "Sara IA (longa)",group: "diphthong" },
  { ch: "เียะ", name: "Sara IA (curta)",group: "diphthong" },
  { ch: "เือ",  name: "Sara UEA (longa)",group: "diphthong" },
  { ch: "เือะ", name: "Sara UEA (curta)",group: "diphthong" },
  { ch: "ัว",  name: "Sara UA (longa)", group: "diphthong" },
  { ch: "ัวะ", name: "Sara UA (curta)", group: "diphthong" },
  // specials
  { ch: "ฤ",  name: "Ru (curta)",     group: "special" },
  { ch: "ฦ",  name: "Lu (curta)",     group: "special" },
  { ch: "ๅ",  name: "Lakkhangyao",    group: "special" },
];

const DIACRITIC_GROUPS = new Set(["above", "below", "tones"]);

// Working state
let STATE = JSON.parse(localStorage.getItem("thaiVowelState") || "null");
if (!STATE) {
  STATE = { strokes: {}, done: {} };
  CHARS.forEach(c => { STATE.strokes[c.ch] = []; });
}

let idx = 0;
let strokes = [];
let drawingPoints = [];
let isDrawing = false;
let showBase = true;
let showGlyph = true;

const SCALE = 5;
const bgCanvas  = document.getElementById("bgCanvas");
const bgCtx     = bgCanvas.getContext("2d");
const drawCanvas = document.getElementById("drawCanvas");
const drawCtx   = drawCanvas.getContext("2d");

function saveState() { localStorage.setItem("thaiVowelState", JSON.stringify(STATE)); }
function normToCanvas(pt) { return [pt[0] * SCALE, pt[1] * SCALE]; }
function canvasToNorm(px, py) { return [Math.round(px / SCALE * 100) / 100, Math.round(py / SCALE * 100) / 100]; }

function drawBackground() {
  const { ch, group } = CHARS[idx];
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  bgCtx.fillStyle = "#fff";
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

  bgCtx.font = "500px 'Sarabun', sans-serif";
  bgCtx.textAlign = "left";
  bgCtx.textBaseline = "alphabetic";

  // For diacritics: optionally show ก as base in very light gray
  if (DIACRITIC_GROUPS.has(group) && showBase) {
    bgCtx.fillStyle = "#d8e8f8";
    bgCtx.fillText("ก", 30, 425);
  }

  // Show the actual vowel/tone mark
  if (showGlyph) {
    bgCtx.fillStyle = "#d0d0d0";
    if (DIACRITIC_GROUPS.has(group)) {
      // render combined with ก so diacritic is visible in correct position
      bgCtx.fillText("ก" + ch, 30, 425);
      // re-draw ก in base color to "subtract" it visually — paint ก in blue tint
      if (showBase) {
        bgCtx.fillStyle = "#d8e8f8";
        bgCtx.fillText("ก", 30, 425);
      }
    } else {
      bgCtx.fillText(ch, 30, 425);
    }
  }

  // baseline reference
  bgCtx.strokeStyle = "#f0f0f0";
  bgCtx.lineWidth = 1;
  bgCtx.beginPath(); bgCtx.moveTo(0, 425); bgCtx.lineTo(460, 425); bgCtx.stroke();
}

function drawStrokes() {
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  const colors = ["#e63946", "#1d3557", "#588157"];
  strokes.forEach((stroke, si) => {
    if (!stroke.length) return;
    drawCtx.strokeStyle = colors[si % colors.length];
    drawCtx.lineWidth = 4;
    drawCtx.lineCap = "round";
    drawCtx.lineJoin = "round";
    drawCtx.beginPath();
    stroke.forEach((pt, i) => {
      const [x, y] = normToCanvas(pt);
      if (i === 0) drawCtx.moveTo(x, y); else drawCtx.lineTo(x, y);
    });
    drawCtx.stroke();
    // start marker
    const [sx, sy] = normToCanvas(stroke[0]);
    drawCtx.fillStyle = "#2a9d34";
    drawCtx.beginPath(); drawCtx.arc(sx, sy, 7, 0, Math.PI * 2); drawCtx.fill();
    drawCtx.strokeStyle = "#111"; drawCtx.lineWidth = 1.5; drawCtx.stroke();
    // end marker
    const [ex, ey] = normToCanvas(stroke[stroke.length - 1]);
    drawCtx.strokeStyle = "#111"; drawCtx.lineWidth = 2.5;
    drawCtx.beginPath();
    drawCtx.moveTo(ex - 6, ey - 6); drawCtx.lineTo(ex + 6, ey + 6);
    drawCtx.moveTo(ex + 6, ey - 6); drawCtx.lineTo(ex - 6, ey + 6);
    drawCtx.stroke();
  });
  // live preview
  if (drawingPoints.length > 0) {
    drawCtx.strokeStyle = "#4f8ef7"; drawCtx.lineWidth = 4;
    drawCtx.beginPath();
    drawingPoints.forEach((pt, i) => { if (i === 0) drawCtx.moveTo(pt[0], pt[1]); else drawCtx.lineTo(pt[0], pt[1]); });
    drawCtx.stroke();
  }
}

function simplify(points, n = 16) {
  if (points.length <= n) return points;
  return Array.from({ length: n }, (_, i) => points[Math.round(i * (points.length - 1) / (n - 1))]);
}

function getCanvasPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - rect.left, src.clientY - rect.top];
}

drawCanvas.addEventListener("pointerdown", e => {
  isDrawing = true;
  drawingPoints = [getCanvasPos(e)];
  drawCanvas.setPointerCapture(e.pointerId);
});
drawCanvas.addEventListener("pointermove", e => {
  if (!isDrawing) return;
  const p = getCanvasPos(e);
  const last = drawingPoints[drawingPoints.length - 1];
  if (!last || Math.hypot(p[0] - last[0], p[1] - last[1]) > 3) {
    drawingPoints.push(p);
    drawStrokes();
  }
});
function finishStroke() {
  if (!isDrawing) return;
  isDrawing = false;
  if (drawingPoints.length >= 2) {
    strokes.push(simplify(drawingPoints.map(p => canvasToNorm(p[0], p[1]))));
    updateInfo();
  }
  drawingPoints = [];
  drawStrokes();
}
drawCanvas.addEventListener("pointerup",     finishStroke);
drawCanvas.addEventListener("pointercancel", finishStroke);

function updateInfo() {
  document.getElementById("strokeInfo").textContent = `${strokes.length} traço(s) registrado(s).`;
}

function loadChar(i) {
  idx = i;
  const { ch, name, group } = CHARS[idx];
  strokes = JSON.parse(JSON.stringify(STATE.strokes[ch] || []));
  drawingPoints = [];
  isDrawing = false;

  document.getElementById("letterDisplay").textContent = DIACRITIC_GROUPS.has(group) ? "ก" + ch : ch;
  document.getElementById("charName").textContent = name;
  document.getElementById("charType").textContent =
    group === "standalone" ? "Vogal independente" :
    group === "above"      ? "Diacrítico acima — ก mostrado como base" :
    group === "below"      ? "Diacrítico abaixo — ก mostrado como base" :
    group === "diphthong"  ? "Ditongo composto" :
    group === "special"    ? "Caractere especial" :
    "Marca de tom — ก mostrado como base";
  document.getElementById("progress").textContent = `${idx + 1} / ${CHARS.length}`;

  const instrMap = {
    standalone: "Trace a vogal diretamente. Ela aparece como caractere independente.",
    above:      "Trace o diacrítico que aparece ACIMA do ก cinza. Ignore o ก — só trace o símbolo da vogal.",
    below:      "Trace o diacrítico que aparece ABAIXO do ก cinza. Ignore o ก — só trace o símbolo da vogal.",
    tones:      "Trace a marca de tom que aparece ACIMA do ก cinza. Ignore o ก — só trace o símbolo do tom.",
    diphthong:  "Trace o ditongo completo como uma unidade. O glifo é renderizado diretamente — trace todos os traços do composto.",
    special:    "Trace o caractere especial diretamente. Ele aparece como glifo independente.",
  };
  document.getElementById("instructions").textContent = instrMap[group];

  drawBackground();
  drawStrokes();
  updateInfo();
  highlightSidebar();
}

function commit(nextIdx) {
  STATE.strokes[CHARS[idx].ch] = strokes;
  STATE.done[CHARS[idx].ch] = true;
  saveState();
  if (nextIdx >= 0 && nextIdx < CHARS.length) loadChar(nextIdx);
}

document.getElementById("btnUndo").onclick   = () => { strokes.pop(); drawStrokes(); updateInfo(); };
document.getElementById("btnClear").onclick  = () => { strokes = []; drawStrokes(); updateInfo(); };
document.getElementById("btnToggleBase").onclick  = () => { showBase  = !showBase;  drawBackground(); drawStrokes(); };
document.getElementById("btnToggleGlyph").onclick = () => { showGlyph = !showGlyph; drawBackground(); drawStrokes(); };
document.getElementById("btnPrev").onclick   = () => commit(idx - 1);
document.getElementById("btnNext").onclick   = () => commit(idx + 1 < CHARS.length ? idx + 1 : idx);
document.getElementById("btnSkip").onclick   = () => {
  STATE.done[CHARS[idx].ch] = false; // mark as skipped (pending)
  saveState();
  loadChar(idx + 1 < CHARS.length ? idx + 1 : idx);
};

document.getElementById("btnDownload").onclick = () => {
  STATE.strokes[CHARS[idx].ch] = strokes;
  saveState();

  const lines = [
    "// Auto-generated by Thai Vowel & Tone Authoring Tool (#356).",
    "// viewBox convention: x 0-~90, y 0-~120 (y-down). Same as thaiStrokes.js.",
    "// Diacritics were traced over a ก base — coordinates reflect real glyph position.",
    "// Each entry: { strokes: [ [ [x,y], ... ], ... ] }",
    "export const THAI_VOWEL_TONES = {",
  ];
  CHARS.forEach(({ ch }) => {
    const s = STATE.strokes[ch] || [];
    lines.push(`  "${ch}": { strokes: ${JSON.stringify(s)} },`);
  });
  lines.push("};");

  const blob = new Blob([lines.join("\n")], { type: "text/javascript" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "thaiVowelTones.js";
  a.click();
};

function highlightSidebar() {
  document.querySelectorAll(".letter-btn").forEach(b => b.classList.remove("active"));
  const btn = document.getElementById("btn-" + idx);
  if (btn) btn.classList.add("active");
}

function buildSidebar() {
  const containers = {
    standalone: document.getElementById("listStandalone"),
    above:      document.getElementById("listAbove"),
    below:      document.getElementById("listBelow"),
    tones:      document.getElementById("listTones"),
    diphthong:  document.getElementById("listDiphthong"),
    special:    document.getElementById("listSpecial"),
  };
  CHARS.forEach(({ ch, name, group }, i) => {
    const btn = document.createElement("div");
    btn.className = "letter-btn";
    btn.id = "btn-" + i;
    const done = STATE.done[ch];
    const display = DIACRITIC_GROUPS.has(group) ? "ก" + ch : ch;
    btn.innerHTML = `<span>${display}</span><span class="badge ${done ? "done" : "pending"}">${done ? "✓" : "…"}</span>`;
    btn.title = name;
    btn.onclick = () => commit(i);
    containers[group].appendChild(btn);
  });
}

buildSidebar();
loadChar(0);
</script>
</body>
</html>
